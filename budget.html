<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrowthMoney</title>
<link rel="icon" type="image/png" href="money.png">





<style>
@font-face {
  font-family: 'Bubble';
  src: url('BubbleShine.otf');}
  *{
  margin:0;
  padding:0;
  box-sizing:border-box;}
body{
  min-height:100vh;
  font-family: 'Bubble', sans-serif;
  background: linear-gradient(rgba(136, 121, 81, 0.7), rgba(197, 177, 121, 0.7)), url('g.jpg') no-repeat center center/cover;
  display:flex;
  justify-content:center;
  padding:50px 0;
  color:#576139;}
.planner-container{
  width:90%;
  max-width:1000px;
  background: rgba(197, 191, 159, 0.45);
  backdrop-filter: blur(8px);
  border: 6px solid #576139;
  border-radius:25px;
  padding:40px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  position:relative;
}
.planner-container h1{
  font-size:90px;
  text-shadow: 4px 4px 0 #a5906d;
  margin-bottom:30px;
  text-align:center;}
.planner-container .section{
  margin-bottom:30px;
}
label{
  display:block;
  font-size:24px;
  margin-bottom:8px;}
input[type="number"]{
  width:100%;
  padding:12px;
  font-size:20px;
  border-radius:15px;
  border:3px solid #3f531d;
  margin-bottom:15px;
  outline:none;}
button{
  display:inline-block;
  padding:14px 40px;
  font-family:'Bubble', sans-serif;
  font-size:24px;
  color:#395228;
  background:transparent;
  border:3px solid #3f531d;
  border-radius:30px;
  cursor:pointer;
  letter-spacing:1px;
  transition:all 0.3s ease;
}
button:hover{
  background:#b4d380;
  color:#a7904b;
  transform:scale(1.05);}
.summary{
  background: rgba(87,97,57,0.1);
  padding:20px;
  border-radius:20px;
  font-size:22px;
}
@media(max-width:900px){
  .planner-container h1{
    font-size:60px;
  }
  input[type="number"]{
    font-size:18px;
  }}
body::-webkit-scrollbar{
  width:10px;}
body::-webkit-scrollbar-track{
  background: rgba(25, 68, 17, 0.836);
  border-radius:10px;}
body::-webkit-scrollbar-thumb{
  background:#50472b;
  border-radius:10px;}
body::-webkit-scrollbar-thumb:hover{
  background:#3f531d;}
#cuteAnim{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 120px;
  z-index: 999;
  pointer-events: none;}
.showCute{
  animation: spinZoom 3s ease forwards;
}
@keyframes spinZoom{
  0%{
    transform: translate(-50%, -50%) scale(0) rotate(0deg);
    opacity: 0;  }
  30%{
    transform: translate(-50%, -50%) scale(1.2) rotate(180deg);
    opacity: 1;  }
  100%{
    transform: translate(-50%, -50%) scale(1) rotate(360deg);
    opacity: 1;  }}
</style>
</head>












<body>
<div class="planner-container">
  <h1>Budget Planer</h1>
  <div class="section income-section">
    <label>Monthly Income:</label>
    <input type="number" id="income" placeholder="Please enter your income"></div>
  <div class="section expenses-section">
    <h2>Expenses</h2>
    <label>Food:</label><input type="number" class="expense" placeholder="Food-expense">
    <label>Rent:</label><input type="number" class="expense" placeholder="Rent-expense">
    <label>Entertainment:</label><input type="number" class="expense" placeholder="Entertainment-expense">
    <label>Education:</label><input type="number" class="expense" placeholder="Education-expense">
    <label>Transport:</label><input type="number" class="expense" placeholder="Transport-expense">
    <label>Misscellaneous:</label><input type="number" class="expense" placeholder="Misscellaneous-expense"></div>
  <div class="section goal-section">
    <label>Savings-Goal:</label>
    <input type="number" id="goal" placeholder="Your target savings"></div>
  <button id="calculate">Calculate Summary</button>
  <button onclick="resetAll()">Reset</button>
  <button onclick="goToRecords()">Records</button>
  <div class="section summary">
    <p id="total-income">TotalIncome: ₹0</p>
    <p id="total-expenses">TotalExpenses: ₹0</p>
    <p id="remaining">Remaining: ₹0</p>
    <p id="goal-status">Saving Goal Reached: No</p>
    <p id="progress"></p>  </div></div>
<img id="cuteAnim" src="cute.png">






<script>
const btn = document.getElementById("calculate");
btn.addEventListener("click", function(){
  const income = Number(document.getElementById("income").value) || 0;
  const expenses = Array.from(document.querySelectorAll(".expense")).reduce((sum, input) => sum + Number(input.value || 0), 0);
  const goal = Number(document.getElementById("goal").value) || 0;
  const remaining = income - expenses;
  let goalStatus = "No";
  document.getElementById("total-income").innerText = "Total Income: ₹" + income;
  document.getElementById("total-expenses").innerText = "Total Expenses: ₹" + expenses;
  document.getElementById("remaining").innerText = "Remaining: ₹" + remaining;
if(goal > 0){
  let needed = goal - remaining;
  let progressText = document.getElementById("progress");
  if(needed <= 0){
    progressText.innerText = "₹0 more needed";
    progressText.style.color = "green";
    goalStatus = "Yes";  
  } else {
    progressText.innerText = "₹" + needed + " more needed";
    progressText.style.color = "#b23a3a";
  }
}
document.getElementById("goal-status").innerText = "Saving Goal Reached: " + goalStatus;
let record = {
  income: income,
  expenses: expenses,
  remaining: remaining,
  goal: goal,
  status: goalStatus,
  date: new Date().toLocaleDateString()
};
let records = JSON.parse(localStorage.getItem("records")) || [];
if(
  records.length === 0 || 
  JSON.stringify(records[records.length - 1]) !== JSON.stringify(record)){
  records.push(record);}
localStorage.setItem("records", JSON.stringify(records));
});
function resetAll(){
  document.querySelectorAll("input").forEach(input => input.value = "");
  document.getElementById("total-income").innerText = "Total Income: ₹0";
  document.getElementById("total-expenses").innerText = "Total Expenses: ₹0";
  document.getElementById("remaining").innerText = "Remaining: ₹0";
  document.getElementById("progress").innerText = "";
  document.getElementById("progress").style.color = "#576139";
  document.getElementById("goal-status").innerText = "Saving Goal Reached: No";
}
  function goToRecords(){
  let img = document.getElementById("cuteAnim");
  img.classList.remove("showCute"); // reset if already running
  void img.offsetWidth;             // force reflow (restart animation)
  img.classList.add("showCute");
  setTimeout(() => {
    window.location.href = "plan.html";
  }, 3000);}
  
  
</script>
</body>
</html>
