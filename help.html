<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrowthMoney - Investment</title>
<link rel="icon" type="image/png" href="money.png">












<style>
@font-face {
  font-family: 'Bubble';
  src: url('BubbleShine.otf');
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;}
body{
  font-family:'Bubble', sans-serif;
  min-height:100vh;
  background: linear-gradient(rgba(136, 121, 81, 0.7), rgba(197, 177, 121, 0.7)), url('g.jpg') no-repeat center center/cover;
  color:#576139;
  padding:50px 20px;
  display:flex;
  justify-content:center;
}
.container{
  width:90%;
  max-width:1000px;
  background: rgba(197, 191, 159, 0.45);
  backdrop-filter: blur(8px);
  border: 6px solid #576139;
  border-radius:25px;
  padding:40px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);}
h1{
  text-align:center;
  font-size:90px;
  margin-bottom:30px;
  text-shadow: 4px 4px 0 #a5906d;
}
.invest-box{
  display:flex;
  align-items:flex-start;
  background: #f5f0d6;
  border-radius:20px;
  padding:20px;
  gap:20px;
  font-size:22px;
  flex-direction: column;}
.invest-header{
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:15px;}
.invest-image{
  width:120px;
  height:120px;
  border:2px dashed #576139;
  border-radius:15px;
  flex-shrink:0;
  background: url('invest.png') center/cover no-repeat;}
.invest-title{
  font-size:36px;
  color:#3f531d;
  font-weight:bold;}
.invest-content{
  color:#3f531d;
  line-height:1.5;
}
</style>









</head>
<Body>
<div class="container">
  <h1>GrowthMoney</h1>
  <div class="invest-box">
    <div class="invest-header">
      <div class="invest-image"></div>
      <div class="invest-title">Investment</div></div>
    <div class="invest-content">
      <p>
      </p>
    </div></div></div>





</Body>
</html>
