<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Records</title>





<style>
@font-face {
  font-family: 'Bubble';
  src: url('BubbleShine.otf');
}
body{
  font-family:'Bubble', sans-serif;
  background: linear-gradient(rgba(136,121,81,0.7), rgba(197,177,121,0.7)), url('g.jpg');
  padding:40px;
  margin:20px;
  border:4px solid #576139;
  box-shadow: 0 0 0 10px #a5906d;}
.title{
  text-align:center;
  font-size:80px;
  color:#576139;
  text-shadow:4px 4px 0 #a5906d;
  margin-bottom:30px;
}
.records-container{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}
.receipt{
  width:260px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(6px);
  border:4px solid #576139;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
  transition: all 0.3s ease;}
.receipt:hover{
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 20px 30px rgba(0,0,0,0.15);
}
h2{
  text-align:center;
  margin-bottom:15px;
  color:#576139;}
.line{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
  font-size:18px;
}
.status{
  margin-top:10px;
  text-align:center;
  font-weight:bold;}
.yes{
  color:rgb(60, 102, 60);}
.no{
  color:rgb(196, 155, 117);}
button{
  position:absolute;
  top:25px;
  left:25px;
  padding:10px 25px;
  font-family:'Bubble', sans-serif;
  font-size:20px;
  color:#576139;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(6px);
  border:3px solid #576139;
  border-radius:30px;
  cursor:pointer;
  letter-spacing:1px;
  transition:all 0.3s ease;
  box-shadow:0 8px 15px rgba(0,0,0,0.1);
}
button:hover{
  background:#576139;
  color:#fff;
  transform:translateY(-2px) scale(1.05);
}
#loginScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: linear-gradient(rgba(136,121,81,0.9), rgba(197,177,121,0.9)), url('g.jpg');
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;}
.login-box{
  width:300px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(8px);
  border:5px solid #576139;
  border-radius:25px;
  padding:30px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);}
.login-box h2{
  font-size:32px;
  color:#576139;
  margin-bottom:20px;}
.login-box input{
  width:100%;
  padding:12px;
  font-size:18px;
  border-radius:15px;
  border:3px solid #576139;
  font-family:'Bubble';
  margin-bottom:10px;}
.login-box button{
  width:100%;
  padding:12px;
  margin-top:10px;
  position:static; }
.login-box button:hover{
  background:#576139;
  color:#fff;
}
@keyframes shake{
  0%{ transform: translateX(0); }
  25%{ transform: translateX(-6px); }
  50%{ transform: translateX(6px); }
  75%{ transform: translateX(-6px); }
  100%{ transform: translateX(0); }
}
.shake{
  animation: shake 0.4s;}
.error{
  color:#b23a3a !important;}

::-webkit-scrollbar{
  width:12px;}
::-webkit-scrollbar-track{
  background: rgba(87,97,57,0.2);
  border-radius:10px;}
::-webkit-scrollbar-thumb{
  background: linear-gradient(#576139, #a5906d);
  border-radius:10px;
  border:2px solid rgba(255,255,255,0.3);}
::-webkit-scrollbar-thumb:hover{
  background: linear-gradient(#3f531d, #7a6a4f); 
  }
</style>
</head>













<body>
<div id="loginScreen">
  <div class="login-box">
    <h2 id="loginTitle">Enter Password</h2>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button onclick="checkPassword()">Continue</button>
  </div>
</div>
<button onclick="goBack()">Back</button>
<h1 class="title">Your Records</h1>
<div class="records-container" id="recordsContainer"></div>










<script>
 function checkPassword(){
  let input = document.getElementById("passwordInput").value;
  let box = document.querySelector(".login-box");
  let title = document.getElementById("loginTitle");
  let savedPassword = localStorage.getItem("appPassword");
  if(!savedPassword){
    if(input){
      localStorage.setItem("appPassword", input);
      document.getElementById("loginScreen").style.display = "none";}
  } else {
    if(input === savedPassword){
      document.getElementById("loginScreen").style.display = "none";
    } else {
      box.classList.remove("shake");
      void box.offsetWidth;
      box.classList.add("shake");
      title.classList.add("error");
      document.getElementById("passwordInput").value = "";    }}}
let records = JSON.parse(localStorage.getItem("records")) || [];
let container = document.getElementById("recordsContainer");
records.forEach(r => {
  let div = document.createElement("div");
  div.classList.add("receipt");
  div.innerHTML = `
    <h2>Record</h2>
<div style="text-align:center; font-size:14px; margin-bottom:10px;">
  ${r.date}
</div>
    <div class="line"><span>Income</span><span>₹${r.income}</span></div>
    <div class="line"><span>Expenses</span><span>₹${r.expenses}</span></div>
    <div class="line"><span>Remaining</span><span>₹${r.remaining}</span></div>
    <div class="line"><span>Goal</span><span>₹${r.goal}</span></div>
    <div class="status ${r.status === "Yes" ? "yes" : "no"}">
      ${r.status === "Yes" ? "Goal Reached" : "Not Reached"}
   </div>`;
  container.appendChild(div);});
function goBack(){
  window.location.href = "budget.html";}
  if(records.length === 0){
  container.innerHTML = "<h2 style='text-align:center;'>No records yet</h2>";
}
</script>










</body>
</html>
