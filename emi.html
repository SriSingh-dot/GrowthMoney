<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMI Calculator - GrowthMoney</title>
<link rel="icon" type="image/png" href="money.png">








<style>
@font-face {
  font-family: 'Bubble';
  src: url('BubbleShine.otf');}
body{
  font-family:'Bubble', sans-serif;
  background: linear-gradient(rgba(136,121,81,0.7), rgba(197,177,121,0.7)), url('g.jpg');
  padding:40px;
  margin:20px;
  border:4px solid #576139;
  box-shadow: 0 0 0 10px #a5906d;}
.title{
  text-align:center;
  font-size:70px;
  color:#576139;
  text-shadow:4px 4px 0 #a5906d;
  margin-bottom:40px;
}
.container{
  max-width:600px;
  margin:auto;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(8px);
  border:4px solid #576139;
  border-radius:25px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
label{
  font-size:20px;
  color:#576139;}
.value{
  float:right;}
input[type="range"]{
  width:100%;
  margin:10px 0 25px 0;
  accent-color:#576139;
}
button{
  width:100%;
  padding:12px;
  font-size:20px;
  font-family:'Bubble';
  border-radius:25px;
  border:3px solid #576139;
  background: rgba(255,255,255,0.5);
  cursor:pointer;
  transition:0.3s;}
button:hover{
  background:#d3ee81;
  color:#96834f;
}
.result{
  margin-top:30px;
  text-align:center;
  font-size:20px;
  color:#576139;
  transition:0.3s;
}
::-webkit-scrollbar{
  width:12px;}
::-webkit-scrollbar-track{
  background: rgba(87,97,57,0.2);
  border-radius:10px;}
::-webkit-scrollbar-thumb{
  background: linear-gradient(#576139, #a5906d);
  border-radius:10px;
  border:2px solid rgba(255,255,255,0.3);}
::-webkit-scrollbar-thumb:hover{
  background: linear-gradient(#3f531d, #7a6a4f); 
  }
  #emi{
  font-size:28px;
  font-weight:bold;
  color:#3f531d;
}
@keyframes spinCute{
  0%{ transform: rotate(0deg); }
  100%{ transform: rotate(360deg); }}
#loaderImg{
  animation: spinCute 1s linear infinite;}
.top-btn{
  position:absolute;
  top:25px;
  left:25px;
  width:auto;
  padding:10px 20px;
  font-size:18px;
}
.money {
  position: fixed;
  top: -50px;
  width: 40px;
  pointer-events: none;
  animation: fall linear forwards;
  z-index: 9999;}
@keyframes fall {
  0% {
    transform: translateY(0) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0.8;  }
}
.credit {
  position: fixed;
  bottom: 15px;
  right: 35px;
  font-size: 14px;
  color: #576139;
  opacity: 0.7;
  font-style: italic;
}
</style></head>











<body>
<button onclick="goIndex()" class="top-btn">Index</button>
<h1 class="title">
  EMI Calculator 
<img src="pookie.png" style="width:100px; height:100px; object-fit:contain; vertical-align:middle; margin-left:15px;">
</h1>
<div class="container">
<label>Loan Amount ₹ <span class="value" id="loanValue">50000</span></label>
<input type="range" id="loan" min="1000" max="1000000" value="50000">
<label>Interest Rate (%) <span class="value" id="rateValue">10</span></label>
<input type="range" id="rate" min="1" max="20" step="0.1" value="10">
<label>Loan Tenure (Months) <span class="value" id="timeValue">12</span></label>
<input type="range" id="time" min="6" max="120" value="12">
<button onclick="calculateEMI()">Calculate EMI</button>
<div id="loader" style="display:none; text-align:center; margin-top:20px;">
  <img src="cute.png" id="loaderImg" style="width:100px;">
</div>
<div class="result" id="result">
  <p>Monthly EMI: ₹<span id="emi">0</span></p>
  <p>Principal Amount: ₹<span id="principal">0</span></p>
  <p>Total Interest: ₹<span id="interest">0</span></p>
  <p>Total Amount: ₹<span id="total">0</span></p></div>
<button onclick="startMoneyRain()">Money Rain </button></div>
<p class="credit">The layout is inspired from Groww</p>












<script>
function goIndex(){
  window.location.href = "attach.html";
}
let loan = document.getElementById("loan");
let rate = document.getElementById("rate");
let time = document.getElementById("time");
loan.oninput = () => document.getElementById("loanValue").innerText = loan.value;
rate.oninput = () => document.getElementById("rateValue").innerText = rate.value;
time.oninput = () => document.getElementById("timeValue").innerText = time.value;
function calculateEMI(){
  let loader = document.getElementById("loader");
  let resultBox = document.getElementById("result");
  loader.style.display = "block";
  resultBox.style.display = "none";
  setTimeout(() => {
    let P = Number(loan.value);
    let R = Number(rate.value) / 12 / 100;
    let N = Number(time.value);
    let EMI = (P * R * Math.pow(1 + R, N)) / (Math.pow(1 + R, N) - 1);
    let total = EMI * N;
    let interest = total - P;
    document.getElementById("emi").innerText = EMI.toFixed(2);
    document.getElementById("principal").innerText = P;
    document.getElementById("interest").innerText = interest.toFixed(2);
    document.getElementById("total").innerText = total.toFixed(2);
    loader.style.display = "none";
    resultBox.style.display = "block";
    resultBox.style.transform = "scale(1.05)";
    setTimeout(() => {
      resultBox.style.transform = "scale(1)";
    }, 200);
  }, 2000); }
  function startMoneyRain(){
  for(let i = 0; i < 25; i++){
    let money = document.createElement("img");
    money.src = "money1.png";
    money.classList.add("money");
    money.style.left = Math.random() * window.innerWidth + "px";
    money.style.width = (30 + Math.random() * 40) + "px";
    money.style.animationDuration = (2 + Math.random() * 3) + "s";
    document.body.appendChild(money);
    setTimeout(() => {
      money.remove();
    }, 5000);}}
</script>






</body>
</html>
